<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="IT Asset Scheduler — Manage IT support appointments for asset returns, swaps, and pickups." />
  <title>IT Asset Scheduler</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="app-header">
    <div class="header-content">
      <h1 class="logo"><a href="#" id="logo-link">🗓️ IT Asset Scheduler</a></h1>
      <nav class="main-nav" aria-label="Main navigation">
        <button class="nav-btn active" data-view="home" id="nav-home">Dashboard</button>
        <button class="nav-btn" data-view="appointments" id="nav-appointments">Appointments</button>
      </nav>
    </div>
  </header>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="app-main">

    <!-- ===== HOME / DASHBOARD VIEW ===== -->
    <section id="home-view" class="view active" aria-label="Dashboard">
      <h2 class="view-title">Dashboard</h2>
      <div id="stats-grid" class="stats-grid"></div>

      <div class="dashboard-bottom">
        <div id="live-widget" class="widget-card">
          <h3>💡 Quote of the Day</h3>
          <p class="widget-loading">Loading…</p>
        </div>
        <div id="recent-list" class="recent-card">
          <h3>🕐 Recent Appointments</h3>
        </div>
      </div>
    </section>

    <!-- ===== APPOINTMENTS VIEW ===== -->
    <section id="appointments-view" class="view" aria-label="Appointments">
      <div class="appointments-header">
        <h2 class="view-title">Appointments</h2>
        <button id="btn-create" class="btn btn-primary">+ New Appointment</button>
      </div>

      <!-- Create / Edit Form (hidden by default) -->
      <div id="form-container" class="form-container hidden">
        <div class="form-card">
          <div class="form-header">
            <h3 id="form-title">Create Appointment</h3>
            <button id="btn-close-form" class="btn btn-icon" aria-label="Close form">&times;</button>
          </div>

          <form id="appointment-form" novalidate>
            <div class="form-grid">
              <div class="form-group">
                <label for="emp-name">Employee Name</label>
                <input type="text" id="emp-name" placeholder="e.g. John Doe" />
              </div>
              <div class="form-group">
                <label for="emp-email">Employee Email</label>
                <input type="email" id="emp-email" placeholder="e.g. john@company.com" />
              </div>
              <div class="form-group">
                <label for="sup-name">Supervisor Name</label>
                <input type="text" id="sup-name" placeholder="e.g. Alice Johnson" />
              </div>
              <div class="form-group">
                <label for="sup-email">Supervisor Email</label>
                <input type="email" id="sup-email" placeholder="e.g. alice@company.com" />
              </div>
              <div class="form-group">
                <label for="appt-type">Appointment Type</label>
                <select id="appt-type">
                  <option value="">Select type…</option>
                  <option value="Return">Return</option>
                  <option value="Swap">Swap</option>
                  <option value="Pickup">Pickup</option>
                </select>
              </div>
              <div class="form-group">
                <label for="appt-date">Date</label>
                <input type="date" id="appt-date" />
              </div>
              <div class="form-group">
                <label for="appt-time">Time</label>
                <input type="time" id="appt-time" min="09:00" max="17:00" />
              </div>
              <div class="form-group form-group-full">
                <label for="appt-notes">Notes</label>
                <textarea id="appt-notes" rows="3" placeholder="Optional notes…"></textarea>
              </div>
            </div>

            <div id="form-errors" class="form-errors"></div>

            <div class="form-actions">
              <button type="submit" id="btn-submit" class="btn btn-primary">Create Appointment</button>
              <button type="button" id="btn-cancel-form" class="btn btn-secondary">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Search & Filter Toolbar -->
      <div class="toolbar">
        <div class="search-group">
          <span class="search-icon" aria-hidden="true">🔍</span>
          <input type="text" id="search-input" placeholder="Search by employee name…" aria-label="Search appointments" />
        </div>
        <div class="filter-group">
          <select id="filter-status" aria-label="Filter by status">
            <option value="all">All Statuses</option>
            <option value="Scheduled">Scheduled</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Resolved">Resolved</option>
            <option value="Cancelled">Cancelled</option>
          </select>
          <select id="filter-type" aria-label="Filter by type">
            <option value="all">All Types</option>
            <option value="Return">Return</option>
            <option value="Swap">Swap</option>
            <option value="Pickup">Pickup</option>
          </select>
          <button id="btn-clear-filters" class="btn btn-secondary btn-sm">✕ Clear Filters</button>
        </div>
      </div>

      <!-- Appointment Cards Gallery -->
      <div id="gallery" class="gallery-grid"></div>
    </section>
  </main>

  <!-- ========== TOAST NOTIFICATIONS ========== -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- ========== FOOTER ========== -->
  <footer class="app-footer">
    <p>&copy; 2026 IT Asset Scheduler</p>
  </footer>

  <!-- JS modules loaded in dependency order -->
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/rules.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
